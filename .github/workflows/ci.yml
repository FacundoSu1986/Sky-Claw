name: Sky-Claw CI/CD

on:
  push:
    branches: [main, master, "feature/**", "claude/**", "copilot/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# CI-FIX-001: Opt into Node.js 24 now — Node.js 20 actions are deprecated
# and will be forced off on 2026-06-02 and removed 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate 1: Code Quality ─────────────────────────────
  lint:
    name: "🔍 Lint (Ruff)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # CI-FIX-002: Install ruff via dev extras for version consistency with
      # local dev environment. Avoids silent format drift caused by unpinned
      # `pip install ruff` resolving to a different minor/patch than local.
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check sky_claw/ tests/ --output-format=github
      - name: Ruff format check
        run: ruff format --check sky_claw/ tests/

  # ── Gate 2: Type Safety ──────────────────────────────
  typecheck:
    name: "🏷️ Type Check (Mypy)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Mypy check
        run: mypy sky_claw/ --ignore-missing-imports --no-error-summary

  # ── Gate 3: Test Suite ───────────────────────────────
  test:
    name: "🧪 Tests (Pytest)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=sky_claw --cov-report=xml --cov-fail-under=49 tests/
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Gate 4: Security ─────────────────────────────────
  security:
    name: "🛡️ Security Scan"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools + project
        run: |
          pip install -e .
          pip install bandit pip-audit setuptools
      - name: Bandit (SAST)
        run: bandit -r sky_claw/ -ll
      - name: Pip-audit (SCA)
        run: pip-audit --skip-editable -r requirements.lock

  # ── Gate 5: Build ────────────────────────────────────
  build:
    name: "📦 Build"
    needs: [lint, typecheck, test, security]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: |
          pip install pyinstaller
          pip install -e .
      - name: Build executable
        run: pyinstaller sky_claw.spec --clean
      - uses: actions/upload-artifact@v4
        with:
          name: SkyClawApp-exe
          path: dist/SkyClawApp.exe